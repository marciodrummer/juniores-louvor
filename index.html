<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala de Louvor - Junho 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f5c842; --orange: #ff7043; --rose: #e91e8c;
            --purple: #7c3aed; --blue: #2563eb; --teal: #0d9488;
            --bg: #fff8f0; --card: #ffffff; --text: #1a1a2e; --muted: #6b6b8a;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
        body::before { content:''; position:fixed; inset:0;
            background: radial-gradient(ellipse at 10% 20%,rgba(245,200,66,.18) 0%,transparent 50%),
                        radial-gradient(ellipse at 90% 10%,rgba(233,30,140,.13) 0%,transparent 50%),
                        radial-gradient(ellipse at 80% 80%,rgba(124,58,237,.12) 0%,transparent 50%),
                        radial-gradient(ellipse at 20% 90%,rgba(37,99,235,.1) 0%,transparent 50%);
            pointer-events:none; z-index:0; }
        .notes-bg { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
        .note { position:absolute; opacity:.07; animation:floatNote linear infinite; }
        @keyframes floatNote {
            0%   { transform:translateY(110vh) rotate(0deg);   opacity:0; }
            10%  { opacity:.08; }
            90%  { opacity:.08; }
            100% { transform:translateY(-10vh) rotate(360deg); opacity:0; }
        }
        header { position:relative; z-index:1; text-align:center; padding:56px 20px 40px; }
        .header-badge { display:inline-block; background:linear-gradient(135deg,var(--gold),var(--orange));
            color:#fff; font-size:.78rem; font-weight:800; letter-spacing:.15em; text-transform:uppercase;
            padding:6px 18px; border-radius:100px; margin-bottom:18px; box-shadow:0 4px 16px rgba(245,112,66,.35); }
        header h1 { font-family:'Playfair Display',serif; font-size:clamp(2.2rem,6vw,3.8rem); font-weight:900;
            line-height:1.1; background:linear-gradient(135deg,var(--orange) 0%,var(--rose) 50%,var(--purple) 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:10px; }
        header p { color:var(--muted); font-size:1.05rem; font-weight:600; }
        .emoji-row { margin-top:14px; font-size:1.6rem; letter-spacing:.2em; animation:pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.08); } }
        .stats { position:relative; z-index:1; display:flex; justify-content:center; gap:12px; flex-wrap:wrap; padding:0 20px 40px; }
        .stat-chip { display:flex; align-items:center; gap:8px; background:#fff; border-radius:100px;
            padding:10px 20px; font-weight:700; font-size:.88rem; box-shadow:0 4px 20px rgba(0,0,0,.08); border:2px solid transparent; }
        .stat-chip.amber { border-color:#fde68a; color:#b45309; }
        .stat-chip.blue  { border-color:#bfdbfe; color:var(--blue); }
        .stat-chip.green { border-color:#bbf7d0; color:#15803d; }
        .stat-dot { width:10px; height:10px; border-radius:50%; }
        .amber .stat-dot { background:#f59e0b; }
        .blue  .stat-dot { background:var(--blue); }
        .green .stat-dot { background:#16a34a; }
        main { position:relative; z-index:1; max-width:960px; margin:0 auto; padding:0 16px 60px; }
        .week-section { margin-bottom:36px; }
        .week-label { display:flex; align-items:center; gap:12px; margin-bottom:14px; padding-left:4px; }
        .week-label span { font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:700; color:var(--muted); white-space:nowrap; }
        .week-line { flex:1; height:2px; background:linear-gradient(to right,rgba(124,58,237,.25),transparent); border-radius:2px; }
        .card { background:var(--card); border-radius:20px; padding:20px 24px; margin-bottom:12px;
            display:grid; grid-template-columns:72px 1fr auto; gap:16px; align-items:center;
            box-shadow:0 4px 24px rgba(0,0,0,.06); border:1.5px solid rgba(255,255,255,.9);
            transition:transform .2s ease,box-shadow .2s ease; position:relative; overflow:hidden; }
        .card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:5px; }
        .card.culto-manha::before { background:linear-gradient(to bottom,var(--gold),var(--orange)); }
        .card.culto-noite::before { background:linear-gradient(to bottom,var(--purple),var(--rose)); }
        .card.celula::before      { background:linear-gradient(to bottom,var(--teal),var(--blue)); }
        .card:hover { transform:translateY(-3px); box-shadow:0 10px 36px rgba(0,0,0,.12); }
        .date-block { text-align:center; }
        .date-day { font-family:'Playfair Display',serif; font-size:2rem; font-weight:900; line-height:1; }
        .culto-manha .date-day { color:var(--orange); }
        .culto-noite .date-day { color:var(--purple); }
        .celula      .date-day { color:var(--teal); }
        .date-month { font-size:.7rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
        .date-weekday { font-size:.68rem; font-weight:800; color:#fff; padding:2px 8px; border-radius:100px; margin-top:4px; display:inline-block; }
        .culto-manha .date-weekday { background:linear-gradient(135deg,var(--gold),var(--orange)); }
        .culto-noite .date-weekday { background:linear-gradient(135deg,var(--purple),var(--rose)); }
        .celula      .date-weekday { background:linear-gradient(135deg,var(--teal),var(--blue)); }
        .card-type { font-size:.7rem; font-weight:800; letter-spacing:.12em; text-transform:uppercase; margin-bottom:2px; }
        .culto-manha .card-type { color:var(--orange); }
        .culto-noite .card-type { color:var(--purple); }
        .celula      .card-type { color:var(--teal); }
        .card-name { font-size:1.05rem; font-weight:800; color:var(--text); margin-bottom:4px; }
        .card-time { font-size:.82rem; font-weight:600; color:var(--muted); }
        .card-right { display:flex; flex-direction:column; align-items:flex-end; gap:8px; }
        .badge-status { font-size:.7rem; font-weight:800; padding:4px 12px; border-radius:100px; white-space:nowrap; }
        .badge-pendente   { background:#fee2e2; color:#dc2626; animation:blink 1.6s ease-in-out infinite; }
        .badge-confirmado { background:#dcfce7; color:#16a34a; }
        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.5; } }
        footer { position:relative; z-index:1; text-align:center; padding:20px; color:var(--muted); font-size:.82rem; font-weight:600; }
        @media (max-width:560px) {
            .card { grid-template-columns:64px 1fr; grid-template-rows:auto auto; padding:16px; gap:10px; }
            .card-right { grid-column:1/-1; flex-direction:row; align-items:center; justify-content:space-between; }
            header { padding:36px 16px 20px; }
        }
    </style>
</head>
<body>
<div class="notes-bg" id="notesBg"></div>
<header>
    <div class="header-badge">&#9835; Ministerio de Louvor Juniores</div>
    <h1>Escala de Louvor<br>Junho 2026</h1>
    <p>Adoracao &middot; Musica &middot; Celula &middot; Culto</p>
    <div class="emoji-row">&#9835; &#10013; &#9836; &#9834; &#9835;</div>
</header>
<div class="stats">
    <div class="stat-chip amber"><span class="stat-dot"></span> 8 Pendentes</div>
    <div class="stat-chip blue"><span class="stat-dot"></span> 12 Eventos</div>
    <div class="stat-chip green"><span class="stat-dot"></span> 4 Confirmados</div>
</div>
<main id="schedule"></main>
<footer>Feito com &#10084; para a gloria de Deus &middot; Junho 2026</footer>
<script>
var MES_LABEL = "Jun/26";
var events = [{"data": "03", "weekday": "Qua", "tipo": "celula", "hora": "19:30", "resp": "Vivi e equipe", "status": "confirmado"}, {"data": "07", "weekday": "Dom", "tipo": "culto-manha", "hora": "10:00", "resp": "Tom e equipe", "status": "pendente"}, {"data": "07", "weekday": "Dom", "tipo": "culto-noite", "hora": "17:45", "resp": "Eliseu e equipe", "status": "confirmado"}, {"data": "10", "weekday": "Qua", "tipo": "celula", "hora": "19:30", "resp": "Rone e equipe", "status": "pendente"}, {"data": "14", "weekday": "Dom", "tipo": "culto-manha", "hora": "10:00", "resp": "Eliseu e equipe", "status": "confirmado"}, {"data": "14", "weekday": "Dom", "tipo": "culto-noite", "hora": "17:45", "resp": "Jose Euclides Band", "status": "pendente"}, {"data": "17", "weekday": "Qua", "tipo": "celula", "hora": "19:30", "resp": "Vivi e equipe", "status": "confirmado"}, {"data": "21", "weekday": "Dom", "tipo": "culto-manha", "hora": "10:00", "resp": "Lelei Adorador", "status": "pendente"}, {"data": "21", "weekday": "Dom", "tipo": "culto-noite", "hora": "17:45", "resp": "Taynara", "status": "pendente"}, {"data": "24", "weekday": "Qua", "tipo": "celula", "hora": "19:30", "resp": "Rone e equipe", "status": "pendente"}, {"data": "28", "weekday": "Dom", "tipo": "culto-manha", "hora": "10:00", "resp": "Taynara", "status": "pendente"}, {"data": "28", "weekday": "Dom", "tipo": "culto-noite", "hora": "17:45", "resp": "Lelei Adorador", "status": "pendente"}];
var weeks  = [{"label": "1a Semana", "dates": ["03", "07"]}, {"label": "2a Semana", "dates": ["10", "14"]}, {"label": "3a Semana", "dates": ["17", "21"]}, {"label": "4a Semana", "dates": ["24", "28"]}];

function cardClass(t) { return t; }
function typeLabel(t) {
    if (t === "celula")      return "&#127968; Celula";
    if (t === "culto-manha") return "&#9728; Culto Manha";
    return "&#127769; Culto Noite";
}

var schedule = document.getElementById("schedule");
weeks.forEach(function(week) {
    var wEvs = events.filter(function(e) { return week.dates.indexOf(e.data) !== -1; });
    if (!wEvs.length) return;
    var sec = document.createElement("div");
    sec.className = "week-section";
    var lbl = document.createElement("div");
    lbl.className = "week-label";
    lbl.innerHTML = "<span>" + week.label + "</span><div class='week-line'></div>";
    sec.appendChild(lbl);
    wEvs.forEach(function(ev) {
        var card = document.createElement("div");
        card.className = "card " + cardClass(ev.tipo);
        card.innerHTML =
            "<div class='date-block'>" +
                "<div class='date-day'>" + ev.data + "</div>" +
                "<div class='date-month'>" + MES_LABEL + "</div>" +
                "<div class='date-weekday'>" + ev.weekday + "</div>" +
            "</div>" +
            "<div class='card-body'>" +
                "<div class='card-type'>" + typeLabel(ev.tipo) + "</div>" +
                "<div class='card-name'>" + ev.resp + "</div>" +
                "<div class='card-time'>&#128336; " + ev.hora + "h</div>" +
            "</div>" +
            "<div class='card-right'>" +
                (ev.status === "confirmado"
                    ? "<span class='badge-status badge-confirmado'>&#10003; Confirmado</span>"
                    : "<span class='badge-status badge-pendente'>&#8987; Pendente</span>") +
            "</div>";
        sec.appendChild(card);
    });
    schedule.appendChild(sec);
});

var notesBg = document.getElementById("notesBg");
var syms = ["&#9833;","&#9834;","&#9835;","&#9836;","&#10013;","&#9996;"];
for (var i = 0; i < 18; i++) {
    var el = document.createElement("span");
    el.className = "note";
    el.innerHTML = syms[i % syms.length];
    el.style.left = (Math.random()*100) + "vw";
    el.style.animationDuration = (18 + Math.random()*22) + "s";
    el.style.animationDelay   = (Math.random()*20) + "s";
    el.style.fontSize = (1.2 + Math.random()*2) + "rem";
    notesBg.appendChild(el);
}
</script>
</body>
</html>
