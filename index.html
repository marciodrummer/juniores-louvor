<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala de Louvor - Junho 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f5c842;
            --orange: #ff7043;
            --rose: #e91e8c;
            --purple: #7c3aed;
            --blue: #2563eb;
            --teal: #0d9488;
            --green: #16a34a;
            --bg: #fff8f0;
            --card: #ffffff;
            --text: #1a1a2e;
            --muted: #6b6b8a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 10% 20%, rgba(245,200,66,0.18) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 10%, rgba(233,30,140,0.13) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(124,58,237,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 90%, rgba(37,99,235,0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .notes-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .note {
            position: absolute;
            opacity: 0.07;
            animation: floatNote linear infinite;
        }
        @keyframes floatNote {
            0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10%  { opacity: 0.08; }
            90%  { opacity: 0.08; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
        header {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 56px 20px 40px;
        }
        .header-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--gold), var(--orange));
            color: white;
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 6px 18px;
            border-radius: 100px;
            margin-bottom: 18px;
            box-shadow: 0 4px 16px rgba(245,112,66,0.35);
        }
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 6vw, 3.8rem);
            font-weight: 900;
            line-height: 1.1;
            background: linear-gradient(135deg, var(--orange) 0%, var(--rose) 50%, var(--purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        header p { color: var(--muted); font-size: 1.05rem; font-weight: 600; }
        .emoji-row {
            margin-top: 14px;
            font-size: 1.6rem;
            letter-spacing: 0.2em;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        .stats {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 0 20px 40px;
        }
        .stat-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            border-radius: 100px;
            padding: 10px 20px;
            font-weight: 700;
            font-size: 0.88rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 2px solid transparent;
        }
        .stat-chip.amber { border-color: #fde68a; color: #b45309; }
        .stat-chip.blue  { border-color: #bfdbfe; color: var(--blue); }
        .stat-dot { width: 10px; height: 10px; border-radius: 50%; }
        .amber .stat-dot { background: #f59e0b; }
        .blue  .stat-dot { background: var(--blue); }
        main {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 0 16px 60px;
        }
        .week-section { margin-bottom: 36px; }
        .week-label {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            padding-left: 4px;
        }
        .week-label span {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--muted);
            white-space: nowrap;
        }
        .week-line {
            flex: 1;
            height: 2px;
            background: linear-gradient(to right, rgba(124,58,237,0.25), transparent);
            border-radius: 2px;
        }
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 72px 1fr auto;
            gap: 16px;
            align-items: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            border: 1.5px solid rgba(255,255,255,0.9);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 5px;
        }
        .card.culto-manha::before { background: linear-gradient(to bottom, var(--gold), var(--orange)); }
        .card.culto-noite::before { background: linear-gradient(to bottom, var(--purple), var(--rose)); }
        .card.celula::before      { background: linear-gradient(to bottom, var(--teal), var(--blue)); }
        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 36px rgba(0,0,0,0.12); }
        .date-block { text-align: center; }
        .date-day {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 900;
            line-height: 1;
        }
        .culto-manha .date-day { color: var(--orange); }
        .culto-noite .date-day { color: var(--purple); }
        .celula      .date-day { color: var(--teal); }
        .date-month {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .date-weekday {
            font-size: 0.68rem;
            font-weight: 800;
            color: white;
            padding: 2px 8px;
            border-radius: 100px;
            margin-top: 4px;
            display: inline-block;
        }
        .culto-manha .date-weekday { background: linear-gradient(135deg, var(--gold), var(--orange)); }
        .culto-noite .date-weekday { background: linear-gradient(135deg, var(--purple), var(--rose)); }
        .celula      .date-weekday { background: linear-gradient(135deg, var(--teal), var(--blue)); }
        .card-type {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .culto-manha .card-type { color: var(--orange); }
        .culto-noite .card-type { color: var(--purple); }
        .celula      .card-type { color: var(--teal); }
        .card-name { font-size: 1.05rem; font-weight: 800; color: var(--text); margin-bottom: 4px; }
        .card-time { font-size: 0.82rem; font-weight: 600; color: var(--muted); }
        .card-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }
        .badge-status {
            font-size: 0.7rem;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 100px;
            white-space: nowrap;
        }
        .badge-pendente {
            background: #fee2e2;
            color: #dc2626;
            animation: blink 1.6s ease-in-out infinite;
        }
        .badge-confirmado {
            background: #dcfce7;
            color: #16a34a;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 600;
        }
        @media (max-width: 560px) {
            .card {
                grid-template-columns: 64px 1fr;
                grid-template-rows: auto auto;
                padding: 16px;
                gap: 10px;
            }
            .card-right {
                grid-column: 1 / -1;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
            header { padding: 36px 16px 20px; }
        }
    </style>
</head>

    <h1>Escala de Louvor<br>Junho 2026</h1>
    <p>Adora├¦├Żo ┬Ę M├║sica ┬Ę C├®lula ┬Ę Culto</p>
    <div class="emoji-row">­¤ÄČ Ō£Ø’ĖÅ ­¤ÄĖ ­¤źü ­¤Ä╣</div>

<script>
var events = [
    // 1┬¬ Semana
    { date:"03", weekday:"Qua", type:"C├®lula",      hora:"19:30", resp:"Vivi e equipe",       status:"pendente" },
    { date:"07", weekday:"Dom", type:"Culto Manh├Ż",  hora:"10:00", resp:"Tom e equipe",         status:"pendente" },

    { date:"10", weekday:"Qua", type:"C├®lula",       hora:"19:30", resp:"Rone e equipe",        status:"pendente" },
    { date:"14", weekday:"Dom", type:"Culto Manh├Ż",  hora:"10:00", resp:"Eliseu e equipe",      status:"confirmado" },
    { date:"14", weekday:"Dom", type:"Culto Noite",  hora:"17:45", resp:"Jos├® Euclides Band",   status:"pendente" },
    // 3┬¬ Semana
    { date:"17", weekday:"Qua", type:"C├®lula",       hora:"19:30", resp:"Vivi e equipe",        status:"pendente" },
    { date:"21", weekday:"Dom", type:"Culto Manh├Ż",  hora:"10:00", resp:"Lelei Adorador",       status:"pendente" },
    { date:"21", weekday:"Dom", type:"Culto Noite",  hora:"17:45", resp:"Taynara",              status:"pendente" },
    // 4┬¬ Semana
    { date:"24", weekday:"Qua", type:"C├®lula",       hora:"19:30", resp:"Rone e equipe",        status:"pendente" },
    { date:"28", weekday:"Dom", type:"Culto Manh├Ż",  hora:"10:00", resp:"Taynara",              status:"pendente" },
    { date:"28", weekday:"Dom", type:"Culto Noite",  hora:"17:45", resp:"Lelei Adorador",       status:"pendente" }
];

function cardClass(ev) {
    if (ev.type.indexOf("lula") !== -1) return "celula";
    if (ev.type.indexOf("anh") !== -1) return "culto-manha";
    return "culto-noite";
}
function typeLabel(ev) {
    if (ev.type.indexOf("lula") !== -1) return "­¤ÅĪ C├®lula";
    if (ev.type.indexOf("anh") !== -1) return "ŌśĆ’ĖÅ Culto Manh├Ż";
    return "­¤īÖ Culto Noite";
}

var weeks = [
    { label:"1┬¬ Semana", dates:["03","07"] },
    { label:"2┬¬ Semana", dates:["10","14"] },
    { label:"3┬¬ Semana", dates:["17","21"] },
    { label:"4┬¬ Semana", dates:["24","28"] }
];

var schedule = document.getElementById("schedule");

weeks.forEach(function(week) {
    var weekEvents = events.filter(function(e) { return week.dates.indexOf(e.date) !== -1; });
    if (!weekEvents.length) return;

    var section = document.createElement("div");
    section.className = "week-section";

    var label = document.createElement("div");
    label.className = "week-label";
    label.innerHTML = "<span>" + week.label + "</span><div class='week-line'></div>";
    section.appendChild(label);

    weekEvents.forEach(function(ev) {
        var cls = cardClass(ev);
        var card = document.createElement("div");
        card.className = "card " + cls;

        var dateBlock = document.createElement("div");
        dateBlock.className = "date-block";
        dateBlock.innerHTML =
            "<div class='date-day'>" + ev.date + "</div>" +
            "<div class='date-month'>Jun/26</div>" +
            "<div class='date-weekday'>" + ev.weekday + "</div>";

        var body = document.createElement("div");
        body.className = "card-body";
        body.innerHTML =
            "<div class='card-type'>" + typeLabel(ev) + "</div>" +
            "<div class='card-name'>" + ev.resp + "</div>" +
            "<div class='card-time'>­¤ĢÉ " + ev.hora + "h</div>";

        var right = document.createElement("div");
        right.className = "card-right";

        var badge = document.createElement("span");
        if (ev.status === "confirmado") {
            badge.className = "badge-status badge-confirmado";
            badge.textContent = "Ō£ģ Confirmado";
        } else {
            badge.className = "badge-status badge-pendente";
            badge.textContent = "ŌÅ│ Pendente";
        }
        right.appendChild(badge);

        card.appendChild(dateBlock);
        card.appendChild(body);
        card.appendChild(right);
        section.appendChild(card);
    });

    schedule.appendChild(section);
});
